version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: founder-autopilot-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      # Exclude the virtual environment if it exists locally
      - /app/.venv
    environment:
      - MOCK_MODE=true
      - OPENAI_API_KEY=EMPTY
      - OPENAI_API_BASE=http://host.docker.internal:8000/v1 # Assuming vLLM runs on host
      - OPENAI_MODEL=Qwen/Qwen2.5-7B-Instruct
    # Allow backend to reach host machine (for vLLM)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: founder-autopilot-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Prevent local node_modules from overriding container's
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend
    restart: unless-stopped
