services:
  python-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: launchops-python-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - MOCK_MODE=${MOCK_MODE:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-EMPTY}
      - DASHBOARD_ORIGIN=http://localhost:3000
    restart: unless-stopped

  platform:
    build:
      context: ./platform
      dockerfile: Dockerfile
      args:
        - VITE_OAUTH_PORTAL_URL=https://manus.im
        - VITE_APP_ID=4iPmRVDpMGdA4fQCzYmfK5
    container_name: launchops-platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - FASTAPI_URL=http://python-backend:8001
      - PORT=3000
    depends_on:
      - python-backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: launchops-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - platform
      - python-backend

volumes:
  caddy_data:
  caddy_config:
