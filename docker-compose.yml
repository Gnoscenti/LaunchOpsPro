version: '3.8'

services:
  python-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: launchops-python-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - /app/.venv
    environment:
      - MOCK_MODE=true
      - OPENAI_API_KEY=EMPTY
      - OPENAI_API_BASE=http://host.docker.internal:8000/v1
      - OPENAI_MODEL=Qwen/Qwen2.5-7B-Instruct
      - DASHBOARD_ORIGIN=http://localhost:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  platform:
    build:
      context: ./platform
      dockerfile: Dockerfile
    container_name: launchops-platform
    ports:
      - "5000:5000"
    volumes:
      - ./platform:/app
      - /app/node_modules
    environment:
      - FASTAPI_URL=http://python-backend:8001
      - DATABASE_URL=sqlite:///sqlite.db
      - SESSION_SECRET=super-secret-key-for-dev
    depends_on:
      - python-backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: launchops-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - platform
      - python-backend

volumes:
  caddy_data:
  caddy_config:
