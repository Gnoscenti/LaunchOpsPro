# ATLAS LaunchOps — Nginx Reverse Proxy (Development / HTTP)
# For production with SSL, deploy.sh --ssl generates atlas-ssl.conf automatically.
#
# This config routes all services through a single Nginx instance on port 80
# using path-based routing (no subdomain DNS required for local development).
#
# Usage: docker compose up -d nginx

# ── Upstream definitions ──────────────────────────────────────────────────────
upstream vaultwarden  { server atlas_vaultwarden:80; }
upstream wordpress    { server atlas_wordpress:80; }
upstream mautic       { server atlas_mautic:80; }
upstream nextcloud    { server atlas_nextcloud:80; }
upstream chatwoot     { server atlas_chatwoot:3000; }
upstream matomo       { server atlas_matomo:80; }
upstream taiga_front  { server atlas_taiga_front:80; }
upstream taiga_back   { server atlas_taiga_back:8000; }

# ── Default server (path-based routing for local dev) ─────────────────────────
server {
    listen 80 default_server;
    server_name localhost _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── ATLAS Dashboard (index) ───────────────────────────────────────────────
    location = / {
        return 200 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATLAS LaunchOps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1e293b; padding: 24px 40px; border-bottom: 1px solid #334155; }
    .header h1 { font-size: 24px; font-weight: 700; color: #38bdf8; }
    .header p  { color: #94a3b8; margin-top: 4px; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; padding: 40px; max-width: 1200px; margin: 0 auto; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 24px; transition: border-color 0.2s; }
    .card:hover { border-color: #38bdf8; }
    .card h2 { font-size: 16px; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; }
    .card p  { font-size: 13px; color: #94a3b8; margin-bottom: 16px; line-height: 1.5; }
    .card a  { display: inline-block; background: #0ea5e9; color: white; padding: 8px 16px;
               border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 500; }
    .card a:hover { background: #38bdf8; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px;
             background: #0f172a; color: #38bdf8; border: 1px solid #334155;
             margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ ATLAS LaunchOps</h1>
    <p>Founder Edition v2.0 — All services running</p>
  </div>
  <div class="grid">
    <div class="card">
      <span class="badge">Security</span>
      <h2>🔐 Vaultwarden</h2>
      <p>Password manager and credential vault. Store all your API keys, passwords, and secrets securely.</p>
      <a href="/vault/">Open Vault</a>
    </div>
    <div class="card">
      <span class="badge">Marketing</span>
      <h2>🌐 WordPress</h2>
      <p>Marketing website and blog. Includes WooCommerce for e-commerce and Yoast SEO.</p>
      <a href="/wp/">Open WordPress</a>
    </div>
    <div class="card">
      <span class="badge">Email Marketing</span>
      <h2>📧 Mautic</h2>
      <p>Email marketing automation, lead scoring, and campaign management.</p>
      <a href="/mautic/">Open Mautic</a>
    </div>
    <div class="card">
      <span class="badge">File Storage</span>
      <h2>📁 Nextcloud</h2>
      <p>Secure file storage and team collaboration. Share documents and manage team files.</p>
      <a href="/files/">Open Nextcloud</a>
    </div>
    <div class="card">
      <span class="badge">Support</span>
      <h2>💬 Chatwoot</h2>
      <p>Customer support live chat and shared inbox. Multi-channel support platform.</p>
      <a href="/support/">Open Chatwoot</a>
    </div>
    <div class="card">
      <span class="badge">Analytics</span>
      <h2>📊 Matomo</h2>
      <p>Privacy-first web analytics. GDPR-compliant tracking without third-party data sharing.</p>
      <a href="/analytics/">Open Matomo</a>
    </div>
    <div class="card">
      <span class="badge">Projects</span>
      <h2>📋 Taiga</h2>
      <p>Agile project management with Kanban boards, sprints, and issue tracking.</p>
      <a href="/projects/">Open Taiga</a>
    </div>
  </div>
</body>
</html>';
        add_header Content-Type text/html;
    }

    # ── Vaultwarden ───────────────────────────────────────────────────────────
    location /vault/ {
        proxy_pass http://vaultwarden/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /vault/notifications/hub {
        proxy_pass http://atlas_vaultwarden:3012/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── WordPress ─────────────────────────────────────────────────────────────
    location /wp/ {
        proxy_pass http://wordpress/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 64M;
    }

    # ── Mautic ────────────────────────────────────────────────────────────────
    location /mautic/ {
        proxy_pass http://mautic/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32M;
    }

    # ── Nextcloud ─────────────────────────────────────────────────────────────
    location /files/ {
        proxy_pass http://nextcloud/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 10G;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ── Chatwoot ──────────────────────────────────────────────────────────────
    location /support/ {
        proxy_pass http://chatwoot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /support/cable {
        proxy_pass http://chatwoot/cable;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Matomo ────────────────────────────────────────────────────────────────
    location /analytics/ {
        proxy_pass http://matomo/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Taiga ─────────────────────────────────────────────────────────────────
    location /projects/ {
        proxy_pass http://taiga_front/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /projects/api/ {
        proxy_pass http://taiga_back/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"atlas-nginx","version":"2.0.0"}';
        add_header Content-Type application/json;
    }
}
