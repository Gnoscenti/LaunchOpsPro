# Dynexis LaunchOps — Nginx Reverse Proxy (TLS-enforced)
#
# Prerequisites:
#   1. Obtain SSL certs via certbot:
#      certbot certonly --nginx -d yourdomain.com -d *.yourdomain.com
#   2. Replace "yourdomain.com" with your actual domain below.
#   3. Restart nginx: systemctl restart nginx
#
# All HTTP traffic is redirected to HTTPS. HSTS is enforced.

upstream wordpress  { server 127.0.0.1:8080; }
upstream suitecrm   { server 127.0.0.1:8081; }
upstream mautic     { server 127.0.0.1:8082; }
upstream matomo     { server 127.0.0.1:8083; }
upstream vault      { server 127.0.0.1:8000; }
upstream launchops  { server 127.0.0.1:8001; }

# ── HTTP → HTTPS redirect (all domains) ──────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Shared SSL/security settings ─────────────────────────────────────────
# Include these in each HTTPS server block via `include` if preferred.
# Inline here for simplicity.

# ── LaunchOps API ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://launchops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ── WordPress ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://wordpress;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

